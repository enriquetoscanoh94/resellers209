<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta - reseller-209</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== EDITA AQUI LOS COLORES ===== */
  :root{
    --negro:#0d0d0d;
    --oro:#e3b23c;
    --verde:#37b34a;
    --blanco:#ffffff;
    --gris:#b8b8b8;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#333;               /* fondo de pantalla (no se imprime) */
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Montserrat',sans-serif;
  }

  /* ===== TARJETA: 3.5 x 2 pulgadas ===== */
  .tarjeta{
    width:3.5in;
    height:2in;
    background:var(--negro);
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    color:var(--blanco);
    padding:0.16in 0.2in;
    display:flex;
    flex-direction:column;
  }

  /* ---- HEADER: logo arriba izquierda + nombre ---- */
  .header{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo{
    height:0.62in;
    width:auto;
    flex:none;
    filter:drop-shadow(0 0 8px rgba(55,179,74,.45));
  }
  .marca{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:1px;
    line-height:1;
  }
  .marca .num{color:var(--oro);}
  .marca .tag{
    display:block;
    font-family:'Montserrat',sans-serif;
    font-weight:500;
    font-size:6px;
    letter-spacing:2.5px;
    color:var(--gris);
    text-transform:uppercase;
    margin-top:3px;
  }

  .divisor{
    width:100%;
    height:2px;
    background:var(--oro);
    margin:8px 0 7px;
  }

  /* ---- PRODUCTOS ---- */
  .productos{
    font-family:'Oswald',sans-serif;
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .mayoreo{
    font-size:7px;
    color:var(--oro);
    letter-spacing:.5px;
    margin-top:3px;
    text-transform:uppercase;
  }

  /* ---- CONTACTO ---- */
  .contacto{ margin-top:auto; }
  .nombre{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:11px;
    letter-spacing:1px;
    margin-bottom:3px;
  }
  .fila{
    display:flex;
    align-items:center;
    gap:5px;
    font-size:8.5px;
    line-height:1.55;
    color:var(--blanco);
  }
  .ic{color:var(--oro);font-weight:700;width:11px;display:inline-block;text-align:center;}
  .telefonos{display:flex;gap:16px;}

  /* ---- QR abajo derecha ---- */
  .qr{
    position:absolute;
    bottom:0.14in;
    right:0.45in;
    width:0.6in;
    height:0.6in;
    background:#fff;
    border-radius:5px;
    padding:2px;
  }
  .qr img{width:100%;height:100%;display:block;}

  /* ===== IMPRESION ===== */
  @media print{
    body{background:#fff;}
    .tarjeta{box-shadow:none;}
    @page{size:3.5in 2in;margin:0;}
  }
</style>
</head>
<body>

  <div class="tarjeta">

    <div class="header">
      <img class="logo" src="../Logore.PNG" alt="reseller-209">
      <div class="marca">
        RESELLER<span class="num">-209</span>
        <span class="tag">Streetwear · Fragrances · Kicks</span>
      </div>
    </div>

    <div class="divisor"></div>

    <div class="productos">Hoodies · Sweaters · Perfumes · Shoes · Sandals</div>
    <div class="mayoreo">Wholesale available — we supply your clothing business</div>

    <div class="contacto">
      <div class="nombre">JUAN VILLANUEVA</div>
      <div class="telefonos">
        <div class="fila"><span class="ic">✆</span> 209-366-8672</div>
        <div class="fila"><span class="ic">✆</span> 209-470-9194</div>
      </div>
      <div class="fila"><span class="ic">◎</span> IG @resellers__209</div>
      <div class="fila"><span class="ic">♪</span> TikTok @juan252863</div>
    </div>

    <div class="qr"><img src="../Qrreseller209.jpeg" alt="QR reseller-209"></div>

  </div>

</body>
</html>
